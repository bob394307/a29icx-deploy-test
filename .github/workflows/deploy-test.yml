name: Deploy Test (OIDC + GHCR)

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Control Plane URL (e.g. https://xxxx.ngrok.io)"
        required: true
        type: string
      image_tag:
        description: "Image tag to build and use"
        required: false
        default: "test"
        type: string

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-images:
    name: Build & push test images to GHCR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: meta
        run: echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Build and push a29icx-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/a29icx-server:${{ steps.meta.outputs.tag }}

      - name: Build and push a29icx-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.core
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/a29icx-core:${{ steps.meta.outputs.tag }}

  trigger-deploy:
    name: Trigger OIDC deployment
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Obtain OIDC token (audience = a29icx-control)
        id: oidc
        run: |
          TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=a29icx-control" \
            | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: POST /deploy/trigger
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ inputs.backend_url }}/deploy/trigger" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"cicd\",
              \"image_tag\": \"${{ needs.build-images.outputs.image_tag }}\",
              \"ref\": \"refs/heads/main\",
              \"workflow\": \"deploy-test.yml\"
            }")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "HTTP $http_code"
          echo "$body"
          if [ "$http_code" != "202" ]; then
            echo "FAILED: expected 202, got $http_code"
            exit 1
          fi
          echo "SUCCESS — job_id: $(echo "$body" | jq -r '.job_id')"
